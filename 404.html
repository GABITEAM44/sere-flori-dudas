<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina nu a fost găsită – Sere Flori Dudas</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1a3d2b; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .wrap { max-width: 480px; }
    .emoji { font-size: 5rem; margin-bottom: 24px; }
    h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.5rem;
      color: #f0d9a0; margin-bottom: 16px; }
    p { color: rgba(255,255,255,.75); line-height: 1.7; margin-bottom: 32px; font-size: 1.05rem; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: #52b788;
      color: #1a3d2b; font-weight: 700; padding: 14px 32px; border-radius: 50px;
      text-decoration: none; font-size: 1rem; transition: background .3s, transform .3s; }
    .btn:hover { background: #f0d9a0; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🌸</div>
    <h1>Pagina nu există</h1>
    <p>Se pare că această pagină a dispărut ca florile toamna. Dar avem multe alte flori frumoase care te așteaptă!</p>
    <a href="index.html" class="btn">🌿 Mergi la pagina principală</a>
  </div>
</body>
</html>
