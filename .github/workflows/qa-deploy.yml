name: QA & Deploy – Sere Flori Dudas

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Validare HTML & Link-uri
  # ─────────────────────────────────────────
  validate:
    name: Validare HTML & Accesibilitate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Instalare Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalare unelte QA
        run: npm install -g htmlhint broken-link-checker

      - name: Validare sintaxă HTML
        run: |
          htmlhint index.html --rules \
            "tagname-lowercase:true,attr-lowercase:true,attr-value-double-quotes:true,\
            doctype-first:true,tag-pair:true,id-unique:true,\
            alt-require:true,title-require:true"
        continue-on-error: true

      - name: Verificare imagini WebP existente
        run: |
          echo "Verificare fișiere WebP..."
          for f in images/*.jpg; do
            webp="${f%.jpg}.webp"
            if [ -f "$webp" ]; then
              echo "✅ $webp"
            else
              echo "❌ LIPSĂ: $webp"
            fi
          done

      - name: Raport dimensiuni imagini
        run: |
          echo "=== Dimensiuni imagini ==="
          du -sh images/*.webp 2>/dev/null | sort -h | tail -10
          echo "Total folder images:"
          du -sh images/

      - name: Verificare dimensiuni imagini WebP (max 1200px)
        run: |
          echo "=== Verificare dimensiuni imagini ==="
          failed=0
          for f in images/*.webp; do
            width=$(python3 -c "from PIL import Image; img=Image.open('$f'); print(img.size[0])" 2>/dev/null || echo "0")
            if [ "$width" -gt 1200 ] 2>/dev/null; then
              echo "❌ Prea mare: $f ($width px)"
              failed=1
            else
              echo "✅ OK: $f ($width px)"
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
        continue-on-error: true

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --upload.target=temporary-public-storage --collect.url=https://gabiteam44.github.io/sere-flori-dudas/ --collect.numberOfRuns=1 || true
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 2: Deploy automat pe GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: Deploy GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy pe GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
